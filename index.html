<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMO 전사 과제관리 시스템 v3</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
 --dk:#0F2544;--bm:#1E4080;--bl:#2563EB;--blt:#DBEAFE;--bpa:#EFF6FF;
 --g9:#111827;--g7:#374151;--g5:#6B7280;--g3:#D1D5DB;--g1:#F9FAFB;--wh:#FFFFFF;
 --ok:#065F46;--okb:#D1FAE5;--rd:#991B1B;--rdb:#FEE2E2;--am:#92400E;--amb:#FEF3C7;
 --font:'Noto Sans KR',sans-serif;--mono:'IBM Plex Mono',monospace;
}
body{font-family:var(--font);background:#ECF0F5;color:var(--g9);font-size:13px}
.nav{background:var(--dk);display:flex;align-items:center;gap:12px;padding:12px 20px;color:#fff}
.nav-title{font-weight:700;font-size:14px}
.page{padding:18px 22px;max-width:1400px;margin:0 auto}
.card{background:#fff;border:1px solid var(--g3);border-radius:8px;padding:14px}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead{background:var(--dk)}
thead th{color:#fff;padding:8px;font-size:11px;text-align:left}
td{padding:8px;border-bottom:1px solid var(--g3);font-size:11px}
.td-key{font-family:var(--mono);color:var(--bl)}
.badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.b-mgmt{background:var(--blt);color:#1E40AF}
.b-ok{background:var(--okb);color:var(--ok)}
.b-bl{background:var(--blt);color:#1D4ED8}
.b-gray{background:#F3F4F6;color:var(--g5)}
.b-kpi-no{background:var(--rdb);color:var(--rd)}
</style>
</head>

<body>

<div class="nav">
  <div class="nav-title">PMO 전사 과제관리</div>
</div>

<div class="page">
  <div class="card">
    <h3 style="margin-bottom:10px">과제 현황 (Jira 실데이터)</h3>
    <div class="tbl-scroll">
      <table>
        <thead>
          <tr>
            <th>구분</th>
            <th>MPSP</th>
            <th>과제명</th>
            <th>담당자</th>
            <th>기한</th>
            <th>상태</th>
            <th>KPI</th>
          </tr>
        </thead>
        <tbody id="task-tbody">
          <!-- Jira 실데이터로 렌더링 -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- pmo-issues.json 내장 -->
<script id="pmo-data" type="application/json">
{
  "issues": [
    {
      "key": "MPSP-375",
      "summary": "AI 기반 네이버 자율매칭 고도화",
      "status": "MPSR 이관",
      "assignee": "안슬기(Seulki An)/상품/배송경험서비스기획팀/11ST",
      "created": "2026-04-23",
      "duedate": ""
    },
    {
      "key": "MPSP-367",
      "summary": "해외직구 Cat. 가송장 페널티 적용",
      "status": "오픈",
      "assignee": "최윤숙(Younsuk Choi)/서비스전략TF/11ST",
      "created": "2026-03-06",
      "duedate": ""
    }
  ]
}
</script>

<script>
(function(){
  function text(v){ return (v ?? '').toString(); }
  function badgeForStatus(s){
    if(s.includes('종료')||s.includes('완료')) return 'b-ok';
    if(s.includes('진행')||s.includes('오픈')) return 'b-bl';
    return 'b-gray';
  }

  const data = JSON.parse(document.getElementById('pmo-data').textContent);
  const tbody = document.getElementById('task-tbody');

  data.issues.forEach(issue=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="badge b-mgmt">관리</span></td>
      <td class="td-key">${issue.key}</td>
      <td>${issue.summary}</td>
      <td>${issue.assignee.split('/')[0]}</td>
      <td>${issue.duedate || '—'}</td>
      <td><span class="badge ${badgeForStatus(issue.status)}">${issue.status}</span></td>
      <td><span class="badge b-kpi-no">미설정</span></td>
    `;
    tbody.appendChild(tr);
  });
})();
</script>

</body>
</html>
